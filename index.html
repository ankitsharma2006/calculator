<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple calculator application" />
    <title>Calculator</title>
    <style>
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #6073a9;
      }
      input {
        font-family: 'Courier New', Courier, monospace;
        margin: 10px;
        padding: 15px;
        font-size: 24px;
        border: 5px solid #4a5b8c;
        border-radius: 250px;
      }
      button {
        margin: 20px;
        padding: 10px 30px;
        font-size: 36px;
        cursor: pointer;
        background-color: #4a5b8c;
        color: white;
        border: 10px solid #45578a;
        border-radius: 5px;
        display: flex;
        gap: 10px;
      }
      .result {
        font-size: 44px;
        font-weight: bold;
        font-family: 'Courier New', Courier, monospace;
        color: #ffffff;
      }
      .buttons {
        display: flex;
        gap: 10px;
      }
      .resultbox {
        font-size: 44px;
        font-weight: bold;
        font-family: 'Courier New', Courier, monospace;
        color: #ffffff;
        background-color: #4a5b8c;
        width: 800px;
        height: 100px;
        border-radius: 5px;
        border: 10px solid #45578a;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <main>
    <div class="resultbox">
      <p>Result: <span class="result">0</span></p>
      </div>
      <input placeholder="First Number" class="num1" type="number" />
      <input placeholder="Second Number" class="num2" type="number" />
    <div class ="buttons">
    <button onclick="calculate('+')">ADD</button>
    <button onclick="calculate('-')">SUBTRACT</button>
    <button onclick="calculate('*')">MULTIPLY</button>
    <button onclick="calculate('/')">DIVIDE</button>
    </div>
    <script>
    const num1Input = document.querySelector('.num1');
    const num2Input = document.querySelector('.num2');
    const resultElement = document.querySelector('.result');

    function calculate(operator) {
      let num1 = parseFloat(num1Input.value);
      let num2 = parseFloat(num2Input.value); 
      let result;

      if (isNaN(num1) || isNaN(num2)) {
        resultElement.textContent = 'Invalid input';
        return;
      }
      switch (operator) {
        case '+':
          result = num1 + num2;
          break;
        case '-':
          result = num1 - num2;
          break;
        case '*':
          result = num1 * num2;
          break;
        case '/':
          if (num2 === 0) {
            resultElement.textContent = 'Cannot divide by 0';
            return;
          }
          result = num1 / num2;
          break;
      }
      resultElement.textContent = result;
    }
  </script>
  </main>
  </body>
</html>
