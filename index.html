<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <main>
    <p class="result"></p>
    <div class="Parentdiv">    
      <div class="operands">
        <button class="1" onclick="display(event.target.textContent)">1</button>
        <button class="2" onclick="display(event.target.textContent)">2</button>
        <button class="3" onclick="display(event.target.textContent)">3</button>
        <button class="4" onclick="display(event.target.textContent)">4</button>
        <button class="5" onclick="display(event.target.textContent)">5</button>
        <button class="6" onclick="display(event.target.textContent)">6</button>
        <button class="7" onclick="display(event.target.textContent)">7</button>
        <button class="8" onclick="display(event.target.textContent)">8</button>
        <button class="9" onclick="display(event.target.textContent)">9</button>
        <button class="0" onclick="display(event.target.textContent)">0</button>
        <button class="decimal" onclick="display(event.target.textContent)">.</button>
        <button class="equals" onclick="display(event.target.textContent)">=</button>
        <button class="clear" onclick="display(event.target.textContent)">Clear</button>
      </div>
      <div class="operators">
        <button class="add" onclick="display(event.target.textContent)">+</button>
        <button class="subtract" onclick="display(event.target.textContent)">-</button>
        <button class="multiply" onclick="display(event.target.textContent)">*</button>
        <button class="divide" onclick="display(event.target.textContent)">/</button>
      </div>
    </div>
    <script src="logic.js"></script>
  </body>
  </main>
</html>
